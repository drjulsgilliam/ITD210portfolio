<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Showcase</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="#" class="logo">Media</a>

                <ul class="nav-links">
                  <li><a href="#image-section">Image</a></li>  
                   <li><a href="#video-section">Video</a></li> 
                    <li><a href="#audio-section">Audio</a></li>     
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <!-- Hero Section-->
       <section class="hero">
        <h1>Experience Media</h1> 
        <p class="hero-subtitle">Immersive. Accessible. Beautiful.</p>

       </section>
       <!-- Image Section-->
        <section class="media-section"> 
            <h2>Image Feature</h2>
            <figure class="media-figure">
              <img src="https://placehold.co/600x400" alt="Placeholder image">   
                <figcaption style="font-size: 16px;">
                This is a placeholder image.
            </figcaption> 
            </figure>
          

        </section>

        <!-- Video Section-->

         <section class="media-section"> 
            <h2>Video Highlight</h2>
            <figure class="media-figure">
                <video controls width="100%">
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                </video>
             <figcaption>Big Buck Bunny - Sample Video Clip
                <br>
                <a href="https://www.w3schools.com/html/mov_bbb.mp4" download="sample-video.mp4">Download Video</a>
             </figcaption>
            </figure>

         </section>

         <!-- Audio Section-->
          <section class="media-section">
            <h2>Audio Clip</h2>
            <figure class="media-figure">
                <audio controls>
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">Your browser does not support audio
                </audio>
            </figure>

          </section>
          
    </main>

    <footer>

    </footer>
</body>
</html>
